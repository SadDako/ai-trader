title = "AI-Trader gitleaks config"

[extend]
useDefault = true

[[rules]]
id = "anthropic-api-key"
description = "Anthropic API key"
regex = '''sk-ant-[A-Za-z0-9_-]{20,}'''
tags = ["key", "anthropic"]

[[rules]]
id = "binance-api-key-header"
description = "Binance API key header literal"
regex = '''(?i)X-MBX-APIKEY\s*[:=]\s*["']?[A-Za-z0-9]{32,}["']?'''
tags = ["key", "binance"]

[[rules]]
id = "bybit-api-key"
description = "Bybit signed-request key literal"
regex = '''(?i)bybit[_-]?api[_-]?key\s*[:=]\s*["']?[A-Za-z0-9]{18,}["']?'''
tags = ["key", "bybit"]

[allowlist]
description = "ignore placeholders, examples, and runtime data"
paths = [
  '''(?i).*\.env\.example$''',
  '''(?i)README\.md$''',
  '''(?i)data/.*''',
  '''(?i)logs/.*''',
  '''(?i)dist/.*''',
  '''(?i)node_modules/.*'''
]
regexes = [
  '''your-api-key-here''',
  '''your-dashboard-token-here''',
  '''change-me''',
  '''replace-me'''
]
